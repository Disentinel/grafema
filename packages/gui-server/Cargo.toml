[package]
name = "grafema-gui-server"
version = "0.1.0"
edition = "2021"
description = "Hex topology map server for Grafema visualization"

[[bin]]
name = "grafema-gui"
path = "src/main.rs"

[dependencies]
# HTTP server
axum = "0.8"
tower-http = { version = "0.6", features = ["fs", "cors"] }
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# CLI
clap = { version = "4", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# MessagePack (RFDB wire protocol)
rmp-serde = "1"

# Error handling
anyhow = "1"

[profile.release]
opt-level = 3
lto = "thin"
