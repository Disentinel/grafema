<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Grafema - Geographic View (WebGPU)</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #0a0a0f; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.tsl.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import {
  float, vec3, vec4, Fn, If, storage, uniform, instanceIndex,
  attribute, smoothstep, pow, length as tslLength, sub, mul, add,
  exp, clamp, max, min, abs, step, uv,
} from 'three/tsl';
import {
  fetchGraphBinaryFull,
  NODE_COLORS, DEFAULT_COLOR, EDGE_COLORS, DEFAULT_EDGE_COLOR,
  createHUD, showLoading,
} from './shared.js';

// ──── WebGPU check ────
if (!navigator.gpu) {
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;
    height:100vh;color:#ff4466;font-size:1.2rem;text-align:center;padding:2rem">
    WebGPU is not supported in this browser.<br>
    <a href="/geographic.html" style="color:#00d4ff;margin-top:1rem;display:block">Use WebGL version</a>
  </div>`;
  throw new Error('WebGPU not supported');
}

const MAX_NODES = 1000;
const BATCH_SIZE = 100;
const BATCH_INTERVAL = 1000; // ms between batch reveals
const SPRING_K = 0.04;
const DAMPING = 0.92;
const SPAWN_Y_OFFSET = 40;

const loading = showLoading('Connecting to RFDB...');
const hud = createHUD('Geographic View (WebGPU)');

// ──── Three.js WebGPU setup ────
const renderer = new THREE.WebGPURenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f);
document.body.appendChild(renderer.domElement);
await renderer.init();

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.003);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 120, 120);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 400;
controls.minDistance = 5;
controls.screenSpacePanning = false;
controls.mouseButtons = {
  LEFT: THREE.MOUSE.PAN,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE,
};

// ──── Fetch full data ────
loading.update('Fetching graph data...');
const graph = await fetchGraphBinaryFull({
  limit: MAX_NODES,
  batchSize: BATCH_SIZE,
  onProgress: (msg) => loading.update(msg),
});

const N = graph.header.nodeCount;
const E = graph.header.edgeCount;
const totalBatches = Math.ceil(N / BATCH_SIZE);
hud.setStats(`${N.toLocaleString()} nodes · ${E.toLocaleString()} edges · ${totalBatches} batches`);

// ──── Resolve types and colors ────
const nodeTypeNames = new Array(N);
for (let i = 0; i < N; i++) {
  nodeTypeNames[i] = graph.header.typeTable[graph.nodeTypeIndices[i]];
}

const sizeMap = {
  PROJECT: 8, SERVICE: 6, MODULE: 4, CLASS: 3, FUNCTION: 2,
  METHOD: 1.8, GETTER: 1.8, INTERFACE: 2.5, VARIABLE: 1,
  CALL: 0.8, IMPORT: 0.8, EXPORT: 0.8, EXPRESSION: 0.6,
  LITERAL: 0.5, PROPERTY_ACCESS: 0.5, TYPE_REFERENCE: 0.4,
};

// ──── CPU arrays for GPU upload ────
// Positions — start spawned above targets
const posData = new Float32Array(MAX_NODES * 3);
const velData = new Float32Array(MAX_NODES * 3); // zeroed
const targetData = new Float32Array(MAX_NODES * 3);
const activeData = new Float32Array(MAX_NODES); // 0 = hidden
const colorData = new Float32Array(MAX_NODES * 3);
const sizeData = new Float32Array(MAX_NODES);

for (let i = 0; i < N; i++) {
  const tx = graph.positions[i * 3];
  const ty = graph.positions[i * 3 + 1];
  const tz = graph.positions[i * 3 + 2];

  targetData[i * 3] = tx;
  targetData[i * 3 + 1] = ty;
  targetData[i * 3 + 2] = tz;

  // Spawn offset: above + random lateral scatter
  posData[i * 3] = tx + (Math.random() - 0.5) * 15;
  posData[i * 3 + 1] = ty + SPAWN_Y_OFFSET + Math.random() * 20;
  posData[i * 3 + 2] = tz + (Math.random() - 0.5) * 15;

  const t = nodeTypeNames[i];
  const hex = NODE_COLORS[t] || DEFAULT_COLOR;
  colorData[i * 3] = ((hex >> 16) & 0xff) / 255;
  colorData[i * 3 + 1] = ((hex >> 8) & 0xff) / 255;
  colorData[i * 3 + 2] = (hex & 0xff) / 255;
  sizeData[i] = sizeMap[t] || 0.7;
}

// ──── Storage buffers ────
const positionBuffer = new THREE.StorageBufferAttribute(posData, 3);
const velocityBuffer = new THREE.StorageBufferAttribute(velData, 3);
const targetBuffer = new THREE.StorageBufferAttribute(targetData, 3);
const activeBuffer = new THREE.StorageBufferAttribute(activeData, 1);

const posStorage = storage(positionBuffer, 'vec3', MAX_NODES);
const velStorage = storage(velocityBuffer, 'vec3', MAX_NODES);
const tgtStorage = storage(targetBuffer, 'vec3', MAX_NODES);
const actStorage = storage(activeBuffer, 'float', MAX_NODES);

// ──── Compute shader (TSL) ────
const computePhysics = Fn(() => {
  const idx = instanceIndex;
  const active = actStorage.element(idx);

  If(active.greaterThan(0.5), () => {
    const pos = posStorage.element(idx);
    const vel = velStorage.element(idx);
    const tgt = tgtStorage.element(idx);

    // Spring force toward target
    const diff = sub(tgt, pos);
    const force = mul(diff, float(SPRING_K));

    // Update velocity with force + damping
    const newVel = mul(add(vel, force), float(DAMPING));
    velStorage.element(idx).assign(newVel);

    // Update position
    const newPos = add(pos, newVel);
    posStorage.element(idx).assign(newPos);
  });
})().compute(MAX_NODES);

// ──── Node rendering — Points with custom TSL material ────
const nodeGeometry = new THREE.BufferGeometry();
// Dummy positions — will be overridden by storage buffer
nodeGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(N * 3), 3));
nodeGeometry.setAttribute('color', new THREE.BufferAttribute(colorData.slice(0, N * 3), 3));
nodeGeometry.setAttribute('aSize', new THREE.BufferAttribute(sizeData.slice(0, N), 1));
nodeGeometry.setAttribute('aActive', new THREE.BufferAttribute(new Float32Array(N), 1));

const nodesMaterial = new THREE.PointsNodeMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
});

// Vertex: override position from storage buffer, compute size
nodesMaterial.positionNode = posStorage.toAttribute();

const aSize = attribute('aSize');
nodesMaterial.sizeNode = mul(aSize, float(4.0));

// Fragment: glow circle
const vColor = attribute('color');
const aActive = actStorage.toAttribute();

nodesMaterial.colorNode = Fn(() => {
  const uvCoord = sub(vec3(uv(), 0.0), vec3(0.5, 0.5, 0.0));
  const dist = tslLength(uvCoord);
  const core = smoothstep(float(0.5), float(0.0), dist);
  const glow = exp(mul(dist, float(-4.0)));
  const alpha = mul(add(core, mul(glow, float(0.6))), aActive);
  const finalColor = mul(vColor, add(float(1.0), mul(glow, float(0.8))));
  return vec4(finalColor, alpha);
})();

// Override opacity based on active state
nodesMaterial.opacityNode = aActive;

const nodePoints = new THREE.Points(nodeGeometry, nodesMaterial);
nodePoints.frustumCulled = false;
scene.add(nodePoints);

// ──── Edge rendering ────
let edgeLines = null;
const edgeOpacity = { value: 0 };

function buildEdges() {
  const edgePositions = new Float32Array(E * 6);
  const edgeColors = new Float32Array(E * 6);

  for (let i = 0; i < E; i++) {
    const si = graph.edgeSrc[i], di = graph.edgeDst[i];
    const type = graph.header.edgeTypeTable[graph.edgeTypeIndices[i]];
    const off = i * 6;

    // Use target positions (final positions)
    edgePositions[off]     = targetData[si * 3];
    edgePositions[off + 1] = targetData[si * 3 + 1];
    edgePositions[off + 2] = targetData[si * 3 + 2];
    edgePositions[off + 3] = targetData[di * 3];
    edgePositions[off + 4] = targetData[di * 3 + 1];
    edgePositions[off + 5] = targetData[di * 3 + 2];

    const hex = EDGE_COLORS[type] || DEFAULT_EDGE_COLOR;
    const r = ((hex >> 16) & 0xff) / 255;
    const g = ((hex >> 8) & 0xff) / 255;
    const b = (hex & 0xff) / 255;
    edgeColors[off] = r;     edgeColors[off + 1] = g; edgeColors[off + 2] = b;
    edgeColors[off + 3] = r; edgeColors[off + 4] = g; edgeColors[off + 5] = b;
  }

  const edgeGeom = new THREE.BufferGeometry();
  edgeGeom.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
  edgeGeom.setAttribute('color', new THREE.BufferAttribute(edgeColors, 3));

  const edgeMat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  edgeLines = new THREE.LineSegments(edgeGeom, edgeMat);
  scene.add(edgeLines);
}

buildEdges();

// ──── Hex zones overlay ────
loading.update('Loading hex layout...');
const hexRes = await fetch('/api/hex-layout');
const hexTree = await hexRes.json();
const Y_STEP = 4;

function createHexRing(cx, cz, radius, y) {
  const pts = [];
  for (let i = 0; i <= 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6;
    pts.push(new THREE.Vector3(
      cx + Math.cos(angle) * radius,
      y,
      cz + Math.sin(angle) * radius
    ));
  }
  return pts;
}

const hexGroup = new THREE.Group();

function renderHex(hex, maxD) {
  const y = -hex.d * Y_STEP;
  const alpha = Math.max(0.08, 0.35 - hex.d * 0.06);
  const color = hex.d === 0 ? 0x334466 : hex.d === 1 ? 0x224455 : 0x1a2233;

  const pts = createHexRing(hex.cx, hex.cz, hex.r, y);
  const lineGeom = new THREE.BufferGeometry().setFromPoints(pts);
  const lineMat = new THREE.LineBasicMaterial({
    color, transparent: true, opacity: alpha,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  hexGroup.add(new THREE.Line(lineGeom, lineMat));

  if (hex.r > 5 && hex.n !== '/') {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const fontSize = Math.min(24, Math.max(10, hex.r * 0.8));
    canvas.width = 512;
    canvas.height = 64;
    ctx.font = `${fontSize * 2}px Inter, sans-serif`;
    ctx.fillStyle = hex.d === 0 ? '#556688' : hex.d === 1 ? '#445566' : '#334455';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = hex.n.length > 30 ? '...' + hex.n.slice(-27) : hex.n;
    ctx.fillText(label, 256, 32);

    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    const spriteMat = new THREE.SpriteMaterial({
      map: tex, transparent: true, opacity: alpha + 0.15,
      depthWrite: false, sizeAttenuation: true,
    });
    const sprite = new THREE.Sprite(spriteMat);
    const labelWidth = Math.min(hex.r * 1.8, 40);
    sprite.scale.set(labelWidth, labelWidth * 0.125, 1);
    sprite.position.set(hex.cx, y + 0.5, hex.cz - hex.r * 0.75);
    hexGroup.add(sprite);
  }

  for (const child of hex.c) renderHex(child, maxD);
}

function findMaxDepth(hex) {
  return hex.c.reduce((m, c) => Math.max(m, findMaxDepth(c)), hex.d);
}
renderHex(hexTree, findMaxDepth(hexTree));
scene.add(hexGroup);

loading.hide();

// ──── Batch reveal logic ────
let currentBatch = 0;
let allBatchesRevealed = false;
let settleStartTime = 0;

// Activate batch 0 immediately
function activateBatch(batchNum) {
  for (let i = 0; i < N; i++) {
    if (graph.batches[i] === batchNum) {
      activeData[i] = 1;
    }
  }
  activeBuffer.array = activeData;
  activeBuffer.needsUpdate = true;
  hud.setProgress(`Batch ${batchNum + 1}/${totalBatches} · ${Math.min((batchNum + 1) * BATCH_SIZE, N)} nodes`);
}

activateBatch(0);
currentBatch = 1;

const batchTimer = setInterval(() => {
  if (currentBatch >= totalBatches) {
    clearInterval(batchTimer);
    allBatchesRevealed = true;
    settleStartTime = performance.now();
    hud.setProgress(`All ${N} nodes revealed — settling...`);
    return;
  }
  activateBatch(currentBatch);
  currentBatch++;
}, BATCH_INTERVAL);

// ──── Raycaster ────
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 1;
const mouse = new THREE.Vector2();
let hoveredIdx = -1;
const tooltipCache = new Map();

// Use target positions for raycasting (stable)
const raycastGeom = new THREE.BufferGeometry();
raycastGeom.setAttribute('position', new THREE.BufferAttribute(targetData.slice(0, N * 3), 3));
const raycastPoints = new THREE.Points(raycastGeom);
raycastPoints.visible = false;
scene.add(raycastPoints);

renderer.domElement.addEventListener('mousemove', async (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(raycastPoints);

  if (intersects.length > 0) {
    const idx = intersects[0].index;
    // Only show tooltip for active nodes
    if (activeData[idx] < 0.5) {
      hoveredIdx = -1;
      hud.tooltip.style.display = 'none';
      return;
    }

    hud.tooltip.style.left = e.clientX + 12 + 'px';
    hud.tooltip.style.top = e.clientY + 12 + 'px';

    if (idx !== hoveredIdx) {
      hoveredIdx = idx;
      hud.tooltip.style.display = 'block';
      hud.tooltip.innerHTML = `<div style="color:#00d4ff;font-weight:600">${nodeTypeNames[idx]}</div>
        <div style="color:#444;font-size:0.6rem;margin-top:2px">...</div>`;

      if (!tooltipCache.has(idx)) {
        try {
          const r = await fetch(`/api/node?index=${idx}`);
          if (r.ok) tooltipCache.set(idx, await r.json());
        } catch {}
      }
      const d = tooltipCache.get(idx);
      if (d && hoveredIdx === idx) {
        hud.tooltip.innerHTML = `<div style="color:#00d4ff;font-weight:600">${d.type}</div>
          <div style="margin-top:2px">${d.name || '(anonymous)'}</div>
          <div style="color:#555;font-size:0.65rem;margin-top:2px">${d.file || ''}${d.line ? ':' + d.line : ''}</div>
          ${d.signature ? `<div style="color:#444;font-size:0.6rem;margin-top:4px;font-family:monospace">${d.signature}</div>` : ''}`;
      }
    }
  } else {
    hoveredIdx = -1;
    hud.tooltip.style.display = 'none';
  }
});

// ──── Animation loop ────
const EDGE_FADE_DELAY = 2000; // ms after all batches to start fading edges in
const EDGE_FADE_DURATION = 2000;

async function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Run compute shader
  await renderer.computeAsync(computePhysics);

  // Fade in edges after settlement
  if (allBatchesRevealed && edgeLines) {
    const elapsed = performance.now() - settleStartTime;
    if (elapsed > EDGE_FADE_DELAY) {
      const t = Math.min(1, (elapsed - EDGE_FADE_DELAY) / EDGE_FADE_DURATION);
      edgeLines.material.opacity = t * 0.4;
      if (t >= 1) {
        hud.setProgress(`${N} nodes · ${E} edges`);
      }
    }
  }

  renderer.render(scene, camera);
}
animate();

// ──── Resize ────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
