# Build Rust binaries (rfdb-server + grafema-orchestrator) for all platforms
#
# Triggered by: git tag binaries-vX.Y.Z && git push --tags
#               git tag rfdb-vX.Y.Z && git push --tags (legacy)
#
# Outputs: GitHub Release with 8 binary assets (2 binaries × 4 platforms)

name: Build Rust Binaries

on:
  push:
    tags:
      - 'binaries-v*'
      - 'rfdb-v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false

          - name: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false

          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use_cross: false

          - name: linux-arm64
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        if: ${{ !matrix.use_cross }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        if: ${{ !matrix.use_cross }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/rfdb-server -> target
            packages/grafema-orchestrator -> target
          key: ${{ matrix.target }}

      # --- rfdb-server ---
      - name: Build rfdb-server (native)
        if: ${{ !matrix.use_cross }}
        working-directory: packages/rfdb-server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build rfdb-server (cross)
        if: ${{ matrix.use_cross }}
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --manifest-path packages/rfdb-server/Cargo.toml
          strip: true

      # --- grafema-orchestrator ---
      - name: Build grafema-orchestrator (native)
        if: ${{ !matrix.use_cross }}
        working-directory: packages/grafema-orchestrator
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build grafema-orchestrator (cross)
        if: ${{ matrix.use_cross }}
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --manifest-path packages/grafema-orchestrator/Cargo.toml
          strip: true

      # --- Strip native builds ---
      - name: Strip binaries (native builds)
        if: ${{ !matrix.use_cross }}
        run: |
          strip packages/rfdb-server/target/${{ matrix.target }}/release/rfdb-server
          strip packages/grafema-orchestrator/target/${{ matrix.target }}/release/grafema-orchestrator

      # --- Prepare for upload ---
      - name: Prepare binaries for upload
        run: |
          mkdir -p dist
          cp packages/rfdb-server/target/${{ matrix.target }}/release/rfdb-server dist/rfdb-server-${{ matrix.name }}
          cp packages/grafema-orchestrator/target/${{ matrix.target }}/release/grafema-orchestrator dist/grafema-orchestrator-${{ matrix.name }}
          chmod +x dist/*
          ls -lh dist/

      - name: Verify binaries
        run: |
          echo "=== rfdb-server ==="
          file dist/rfdb-server-${{ matrix.name }}
          du -h dist/rfdb-server-${{ matrix.name }}
          echo "=== grafema-orchestrator ==="
          file dist/grafema-orchestrator-${{ matrix.name }}
          du -h dist/grafema-orchestrator-${{ matrix.name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rfdb-server-${{ matrix.name }}
            dist/grafema-orchestrator-${{ matrix.name }}
          fail_on_unmatched_files: true
