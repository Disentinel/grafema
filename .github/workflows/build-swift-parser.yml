name: Build Swift Parser

on:
  push:
    paths:
      - 'packages/swift-parser/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: packages/swift-parser
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

      - name: Verify binary
        run: file .build/release/swift-parser && ls -la .build/release/swift-parser

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: swift-parser-macos-${{ matrix.arch }}
          path: packages/swift-parser/.build/release/swift-parser
